<!DOCTYPE html>
<html>

<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pan Yu-Yang</title>

<!-- 引入圖標庫，讓底部的圓形按鈕內顯示漂亮的 IG 和 信箱圖示 -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
body {
    font-family: Helvetica, Arial, sans-serif;
    margin: 0;
    padding: 0;
    background-color: #121212; 
    color: #ffffff;            
    display: flex; 
    min-height: 100vh;
}

/* 左側固定側邊欄選單 */
.sidebar {
    width: 260px;
    padding: 60px 40px;
    border-right: 1px solid #252525; 
    position: fixed; 
    height: 100vh;
    box-sizing: border-box;
    z-index: 10;
    background-color: #121212;
}

.sidebar h2 {
    font-size: 22px;
    font-weight: normal;
    margin-bottom: 40px;
    letter-spacing: 2px;
}

.menu-item {
    display: block;
    text-decoration: none;
    color: #ffffff;
    font-size: 16px;
    margin-bottom: 24px;
    cursor: pointer;
    user-select: none;
}

.menu-item:hover, .submenu-item:hover {
    color: #aaaaaa;
}

/* 預設隱藏的子選單外殼 */
.submenu {
    margin-left: 15px;
    border-left: 1px solid #333; 
    padding-left: 15px;
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.3s ease-out, margin-bottom 0.3s ease-out;
}

/* 當子選單被加上 .open 樣式時才會展開 */
.submenu.open {
    max-height: 100px; 
    margin-bottom: 24px;
}

.submenu-item {
    display: block;
    text-decoration: none;
    color: #888888; 
    font-size: 14px;
    margin-bottom: 12px;
}

.submenu-item.active {
    color: #ffffff;
    font-weight: bold;
    pointer-events: none;
}

/* ==========================================
   🎨 修改後的右側主要內容區（改造成更具留白美感的比例）
   ========================================== */
.main-content {
    margin-left: 260px; 
    padding: 60px 40px;
    width: calc(100% - 260px);
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    align-items: center;    /* 讓內容水平居中 */
    justify-content: center; /* 讓內容垂直居中 */
    min-height: 100vh;
}

/* 頂部兩行姓名樣式 */
.profile-name-en {
    font-size: 28px;        /* 微調字型大小更顯秀氣 */
    letter-spacing: 2px;
    margin-bottom: 10px;
    font-weight: 300;
}

.profile-name-zh {
    font-size: 20px;
    letter-spacing: 6px;
    margin-bottom: 35px;    /* 微調間距 */
    font-weight: 400;
}

/* 個人照顯示容器（縮小成更精緻的質感比例） */
.profile-img-wrapper {
    width: 100%;
    max-width: 260px;       /* ✨ 電腦版縮小為 260px，讓畫面整體更輕盈有質感 */
    margin-bottom: 45px;
    display: flex;
    justify-content: center;
}

.profile-img-wrapper img {
    width: 100%;
    height: auto;
    object-fit: contain;
    display: block;
}

/* 社群按鈕容器 */
.social-buttons {
    display: flex;
    gap: 24px;              /* 稍微拉開圓圈之間的間隔 */
}

/* 雙圓形按鈕樣式 */
.circle-btn {
    width: 40px;            /* 按鈕也等比例修細緻一點 */
    height: 40px;
    background-color: #262626; /* 使用更有質感的暗灰底色 */
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    color: #ffffff;
    text-decoration: none;
    font-size: 18px;
    transition: background-color 0.2s ease, transform 0.2s ease;
}

.circle-btn:hover {
    background-color: #444444; 
    transform: scale(1.05);     
}

/* 📱 手機版排版修正 */
@media (max-width: 768px) {
    body {
        flex-direction: column;
    }

    .sidebar {
        position: relative;
        width: 100%;
        height: auto;
        padding: 30px 20px;
        border-right: none;
        border-bottom: 1px solid #252525;
    }

    .sidebar h2 {
        margin-bottom: 20px;
    }

    .main-content {
        margin-left: 0;
        width: 100%;
        padding: 60px 20px;
        min-height: calc(100vh - 200px); 
    }

    .profile-name-en { font-size: 24px; }
    .profile-name-zh { font-size: 18px; }
    .profile-img-wrapper { max-width: 180px; } /* ✨ 手機版同步縮小為 180px */
}
</style>
</head>

<body>

<nav class="sidebar">
    <h2>Pan Yu-Yang</h2>
    <a href="about.html" class="menu-item">走過</a>
    
    <span class="menu-item" onclick="toggleArtMenu()">畫過</span>
    <div class="submenu" id="art-submenu">
        <a href="genealogy.html" class="submenu-item">族譜系列</a>
        <a href="pseudo-classic.html" class="submenu-item">擬古系列</a>
    </div>
    
    <a href="writing.html" class="menu-item">寫過</a>
</nav>

<main class="main-content">

    <!-- 1️⃣ 兩行姓名 -->
    <div class="profile-name-en">Pan Yu Yang</div>
    <div class="profile-name-zh">潘羽鍚</div>

    <!-- 2️⃣ 中央指定名稱的個人照路徑 -->
    <div class="profile-img-wrapper">
        <img src="個人照_彩色.jpg" alt="潘羽鍚 Pan Yu Yang">
    </div>

    <!-- 3️⃣ 最底部的雙圓形按鈕（左邊 IG，右邊信箱） -->
    <div class="social-buttons">
        <!-- IG 圓形按鈕 -->
        <a href="https://www.instagram.com/bennypan920717/" target="_blank" class="circle-btn" title="Instagram">
            <i class="fab fa-instagram"></i>
        </a>
        <!-- 信箱 圓形按鈕 -->
        <a href="mailto:benny920717@gmail.com" class="circle-btn" title="Email">
            <i class="far fa-envelope"></i>
        </a>
    </div>

</main>

<script>
// 控制「畫過」選單展開收合的 Script
function toggleArtMenu() {
    var submenu = document.getElementById('art-submenu');
    submenu.classList.toggle('open');
}
</script>

</body>
</html>
