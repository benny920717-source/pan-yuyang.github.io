<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"> 
<style>
body { font-family: Helvetica, Arial, sans-serif; margin: 0; padding: 0; background-color: #574C57; color: #ffffff; }

/* 讓標題與頂部距離適中，標題與下方圖的距離設為 15px */
.main-content { margin: 0 auto; padding: 80px 40px 60px 40px; max-width: 900px; width: 100%; box-sizing: border-box; }
h1 { font-size: 24px; font-weight: normal; margin-bottom: 15px; letter-spacing: 2px; text-align: center; }

/* 圖片之間原本 140px，現在縮減為 50px */
.work-card { margin-bottom: 50px; }

/* 關鍵修正：取消固定高度，讓圖片依照自身比例顯示 */
.work-img-wrapper { 
    width: 100%; 
    display: flex; 
    justify-content: center; 
    background-color: #574C57; 
    overflow: hidden;
}
.work-img-wrapper img { 
    width: 100%; 
    height: auto; 
    display: block; 
}

/* 圓形按鈕的間距微調，更加緊湊 */
.circle-toggle-trigger { 
    width: 40px; height: 40px; background-color: rgba(0,0,0,0.2); border-radius: 50%; 
    display: flex; justify-content: center; align-items: center; cursor: pointer; 
    margin: 15px auto 15px auto; transition: background 0.2s;
}
.circle-toggle-trigger:hover { background-color: rgba(0,0,0,0.4); }

.toggle-content { max-height: 0; overflow: hidden; transition: all 0.4s ease; opacity: 0; }
.toggle-content.open { max-height: 500px; opacity: 1; }
.work-meta { font-size: 14px; font-weight: bold; margin-bottom: 10px; text-align: center; }
.work-seal { font-size: 13px; line-height: 1.6; color: #e0f2f1; text-align: center; margin-bottom: 20px; }
</style>
</head>
<body>

<main class="main-content">
    <h1>擬古系列</h1>    
    <script>
        // 您的作品資料保持不變
        const works = [
            { title: "長尾山娘巴蕊圖", info: "2024｜原子筆、牛皮紙｜35 × 54 cm", seal: "印章文字：當頭上拂過鈷藍的殘影..." },
            { title: "牧書圖", info: "2024｜原子筆、牛皮紙｜20 × 40 cm", seal: "印章文字：沒有所謂的荒島書單..." }
            // ... 其餘作品
        ];

        works.forEach(work => {
            document.write(`
                <div class="work-card">
                    <div class="work-img-wrapper">
                        <img src="${work.title}_全貌.jpg" alt="${work.title}">
                    </div>
                    <div class="circle-toggle-trigger" onclick="toggleWorkContent(this)"><i class="fas fa-chevron-down"></i></div>
                    <div class="toggle-content">
                        <div class="work-meta">${work.title}｜${work.info}</div>
                        <div class="work-seal">${work.seal}</div>
                    </div>
                </div>
            `);
        });
    </script>
</main>

<script>
    function toggleWorkContent(t) { 
        t.classList.toggle('open'); 
        t.nextElementSibling.classList.toggle('open'); 
    }
</script>
</body>
</html>
