<!DOCTYPE html>
<html>

<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"> 
<title>擬古系列 - Pan Yu-Yang</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
body {
    font-family: Helvetica, Arial, sans-serif;
    margin: 0;
    padding: 0;
    background-color: #574C57; 
    color: #ffffff;            
    min-height: 100vh;
}

/* 頂部導覽列 (與族譜系列一致) */
.top-navbar { position: fixed; top: 0; left: 0; width: 100%; padding: 30px 40px; box-sizing: border-box; display: flex; justify-content: space-between; align-items: center; z-index: 100; }
.menu-toggle-btn, .search-toggle-btn { font-size: 24px; cursor: pointer; color: #ffffff; }

/* 側欄 */
.nav-panel { position: fixed; top: 70px; left: 40px; width: 150px; background-color: #ffffff; z-index: 90; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-radius: 6px; max-height: 0; overflow: hidden; opacity: 0; padding: 0 20px; transition: all 0.3s; }
.nav-panel.open { max-height: 400px; opacity: 1; padding: 20px; }
.menu-item { display: block; text-decoration: none; color: #574C57; font-size: 15px; margin-bottom: 15px; cursor: pointer; }
.submenu { padding-left: 10px; border-left: 2px solid #574C57; margin-bottom: 15px; }
.submenu-item { display: block; text-decoration: none; color: #574C57; font-size: 13px; margin-bottom: 8px; }
.submenu-item.active { font-weight: bold; }

/* 搜尋視窗 */
.search-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 300; display: none; justify-content: center; align-items: center; }
.search-overlay.open { display: flex; }
.search-input { background: transparent; border: none; border-bottom: 1px solid #fff; color: #fff; font-size: 24px; text-align: center; width: 50%; }

/* 主要內容 */
.main-content { margin: 0 auto; padding: 120px 40px 60px; max-width: 900px; }
h1 { font-size: 24px; text-align: center; margin-bottom: 60px; letter-spacing: 2px; }

.work-card { margin-bottom: 120px; position: relative; }
.work-img-wrapper { width: 100%; height: 600px; background-color: #574C57; display: flex; justify-content: center; align-items: center; margin-bottom: 20px; }
.work-img-wrapper img { max-width: 100%; max-height: 100%; object-fit: contain; }

/* 半透明圓形按鈕 */
.circle-toggle { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); width: 40px; height: 40px; background: rgba(0,0,0,0.3); border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; color: white; transition: 0.3s; }
.circle-toggle:hover { background: rgba(0,0,0,0.6); }

.toggle-content { max-height: 0; overflow: hidden; transition: 0.4s; }
.toggle-content.open { max-height: 500px; margin-top: 20px; }
.work-meta { font-weight: bold; margin-bottom: 10px; }
.work-seal { line-height: 1.8; color: #ccc; white-space: pre-line; }

.thumb-container { display: flex; gap: 10px; margin-top: 20px; }
.thumb-img { width: 70px; height: 70px; object-fit: cover; cursor: pointer; opacity: 0.6; }
.thumb-img.active { opacity: 1; border: 1px solid #fff; }

@media (max-width: 768px) {
    .work-img-wrapper { height: 300px; }
    .main-content { padding: 80px 20px; }
}
</style>
</head>

<body>

<header class="top-navbar">
    <div class="menu-toggle-btn" onclick="document.getElementById('navPanel').classList.toggle('open')"><i class="fas fa-bars"></i></div>
    <div class="search-toggle-btn" onclick="document.getElementById('searchOverlay').classList.add('open')"><i class="fas fa-search"></i></div>
</header>

<nav class="nav-panel" id="navPanel">
    <a href="index.html" class="menu-item">首頁</a>
    <a href="about.html" class="menu-item">走過</a>
    <span class="menu-item" onclick="document.getElementById('art-submenu').classList.toggle('open')">畫過</span>
    <div class="submenu" id="art-submenu">
        <a href="genealogy.html" class="submenu-item">族譜系列</a>
        <a href="pseudo-classic.html" class="submenu-item active">擬古系列</a>
    </div>
    <a href="writing.html" class="menu-item">寫過</a>
</nav>

<div class="search-overlay" id="searchOverlay">
    <input type="text" class="search-input" placeholder="搜尋..." onkeydown="if(event.key==='Escape') this.parentElement.classList.remove('open')">
</div>

<main class="main-content">
    <h1>擬古系列</h1>

    <script>
        // 為了節省空間，我用一個函式來定義結構，確保9個區塊邏輯一致，且您看到的程式碼是完整的
        function renderWork(id, title, meta, seal) {
            document.write(`
            <div class="work-card">
                <div class="work-img-wrapper">
                    <img id="main-img-${id}" src="${title}_全貌.jpg">
                    <div class="circle-toggle" onclick="this.parentElement.nextElementSibling.classList.toggle('open')">▼</div>
                </div>
                <div class="toggle-content">
                    <div class="work-meta">${title}｜${meta}</div>
                    <div class="work-seal">${seal}</div>
                    <div class="thumb-container">
                        <img class="thumb-img active" src="${title}_全貌.jpg" onclick="switchImage('main-img-${id}', this)">
                        <img class="thumb-img" src="${title}_局部1.jpg" onclick="switchImage('main-img-${id}', this)">
                        <img class="thumb-img" src="${title}_局部2.jpg" onclick="switchImage('main-img-${id}', this)">
                        <img class="thumb-img" src="${title}_局部3.jpg" onclick="switchImage('main-img-${id}', this)">
                        <img class="thumb-img" src="${title}_局部4.jpg" onclick="switchImage('main-img-${id}', this)">
                    </div>
                </div>
            </div>`);
        }

        renderWork(1, "長尾山娘巴蕊圖", "2024｜原子筆、牛皮紙｜35 × 54 cm", "印章文字：當頭上拂過鈷藍的殘影／伴隨拔髮般的刺痛／他嚇得縮起脖子、吐出髒字／直到他發現葉叢間有一條黑白分明的尾羽／才知道這是傳說中的台灣藍鵲空襲／之後提起這件事／他總會說／討厭啦／超級痛ㄉ／然後語氣一轉／可是能被國寶鳥巴頭／真是一種榮幸／希望明年再被巴一次");
        renderWork(2, "牧書圖", "2024｜原子筆、牛皮紙｜20 × 40 cm", "印章文字：沒有所謂的荒島書單／因為當你帶了一本書去荒島／那麼荒島就不是荒島了");
        renderWork(3, "七仙女圖", "2024｜原子筆、牛皮紙｜35 × 54 cm", "印章文字：我有一個姐姐、兩個表姐、四個堂姐／家人稱之為七仙女／她們從領紅包變成包紅包的人／在婚禮與喪禮短暫相聚");
        renderWork(4, "七擒七縱圖", "2024｜原子筆、牛皮紙｜35 × 54 cm", "印章文字：小時候讀七擒七縱的故事／發現要收服敵人太辛苦了／如果我遇到敵人／會有那麼多的才智與耐心來應對嗎");
        renderWork(5, "在路上", "2024｜原子筆、牛皮紙｜20 × 40 cm", "印章文字：往返書展的路上／我們的行李都裝著滿滿的書／錯錯覺閱讀的重量");
        renderWork(6, "活兩次圖", "2025｜原子筆、牛皮紙｜20 × 40 cm", "印章文字：當天外傳來一句對你的超譯／你也許就不再是自己形象的主人了（陰刻）可怕的是／你所不存在的時空中／會有另一個你在和陌生人打交道（陽刻）");
        renderWork(7, "無鬼知曉的中元午後圖", "2025｜原子筆、牛皮紙｜35 × 54 cm", "印章文字：去年中元節／老家沒有張羅普渡／異常安靜／因為親人隱隱相信阿祖的亡靈還沒離開／不宜干擾");
        renderWork(8, "麵線失蹤圖", "2025｜原子筆、牛皮紙｜35 × 54 cm", "印章文字：巷口那家麵線攤失蹤了／傳說老闆欠債跑路（陽刻）成為吃不到卻永遠好吃的記憶（陰刻）");
        renderWork(9, "鴨頭走味圖", "2025｜原子筆、牛皮紙｜35 × 54 cm", "印章文字：巷口那家東山鴨頭從小攤變小店／感覺以前的比較好吃（陽刻）不知是二代目退步了／還是自己嘴刁了（陰刻）");
    </script>
</main>

<script>
    function switchImage(mainImgId, thumbElement) {
        document.getElementById(mainImgId).src = thumbElement.src;
        let container = thumbElement.parentElement;
        Array.from(container.children).forEach(img => img.classList.remove('active'));
        thumbElement.classList.add('active');
    }
</script>

</body>
</html>
